window._fs={collection,doc,setDoc,getDoc,getDocs,onSnapshot,deleteDoc,updateDoc};

window._getDocs=async function(col){return await getDocs(collection(db,col));};

// Load settings
getDoc(doc(db,"appSettings","ownerInfo")).then(d=>{if(d.exists())window._ownerName=d.data().name||"Owner";}).catch(()=>{});
getDoc(doc(db,"appSettings","prevStock")).then(d=>{if(d.exists())window._prevStock=d.data();}).catch(()=>{});
getDoc(doc(db,"appSettings","pins")).then(d=>{
  if(d.exists()){window._ownerPin=String(d.data().ownerPin||d.data().operationalHeadPin||"").trim();window._viewerPin=String(d.data().viewerPin||"").trim();}
  else{window._ownerPin="";window._viewerPin="";}
  window._pinLoaded=true;
  if(window._onPinLoaded)window._onPinLoaded();
}).catch(()=>{window._ownerPin="";window._pinLoaded=true;if(window._onPinLoaded)window._onPinLoaded();});

// Standard listeners
onSnapshot(collection(db,"staffCodes"),snap=>{window._staffCodes=snap.docs.map(d=>({id:d.id,...d.data()}));});
onSnapshot(collection(db,"customers"),snap=>{window._customers=snap.docs.map(d=>({id:d.id,...d.data()}));if(window._onDataUpdate)window._onDataUpdate();});
onSnapshot(collection(db,"vendors"),snap=>{window._vendors=snap.docs.map(d=>({id:d.id,...d.data()}));if(window._onDataUpdate)window._onDataUpdate();});
onSnapshot(collection(db,"reports"),snap=>{window._reports=snap.docs.map(d=>({id:d.id,...d.data()})).sort((a,b)=>(b.savedAt||"").localeCompare(a.savedAt||""));if(window._onDataUpdate)window._onDataUpdate();});

// ── MAIN DAY LISTENER ──
// Simple rule: Firebase is the source of truth.
// On every update, merge arrays by ID (union) — never reduce.
onSnapshot(doc(db,"currentDay","today"),snap=>{
  if(!snap.exists()){window._latestDay=null;return;}
  const fresh=snap.data();
  window._latestDay=fresh;
  if(!appState.unlocked)return;
  if(fresh.date&&fresh.date!==appState.day.date){
    appState.day=Object.assign(newDay(),fresh);
    appState.day.sales=JSON.parse(JSON.stringify(fresh.sales||[]));
    appState.day.expenses=JSON.parse(JSON.stringify(fresh.expenses||[]));
    appState.day.purchases=JSON.parse(JSON.stringify(fresh.purchases||[]));
    appState.day.finishedStock=JSON.parse(JSON.stringify(fresh.finishedStock||{}));
    render();return;
  }
  // Same date — ONLY ADD, never remove
  let changed=false;
  const lsIds=new Set((appState.day.sales||[]).map(s=>s.id));
  (fresh.sales||[]).forEach(s=>{if(s&&s.id&&!lsIds.has(s.id)){appState.day.sales.push(JSON.parse(JSON.stringify(s)));changed=true;}});
  const leIds=new Set((appState.day.expenses||[]).map(e=>e.id));
  (fresh.expenses||[]).forEach(e=>{if(e&&e.id&&!leIds.has(e.id)){appState.day.expenses.push(JSON.parse(JSON.stringify(e)));changed=true;}});
  const lpIds=new Set((appState.day.purchases||[]).map(p=>p.id));
  (fresh.purchases||[]).forEach(p=>{if(p&&p.id&&!lpIds.has(p.id)){appState.day.purchases.push(JSON.parse(JSON.stringify(p)));changed=true;}});
  ['shift','incharge','notes','production','stock','preforms','shrinkStock','stickerStock','rmUsage','deposits'].forEach(k=>{
    if(fresh[k]!==undefined)appState.day[k]=fresh[k];
  });
  if(window._onDataUpdate)window._onDataUpdate();
  if(changed){const act=document.activeElement;if(!act||act.tagName==="BODY"||act.tagName==="HTML")render();}
});

// Direct fetch of today's data — always loads sales regardless of date match
window._fbFetchToday=async function(){
  try{
    const snap=await getDoc(doc(db,"currentDay","today"));
    if(snap.exists()){
      const fresh=snap.data();
      window._latestDay=fresh;
      if(appState.unlocked){
        // Load ALL sales from Firebase — replace local if Firebase has more
        if((fresh.sales||[]).length>=(appState.day.sales||[]).length){
          appState.day.sales=JSON.parse(JSON.stringify(fresh.sales||[]));
        } else {
          // Local has more — just add any missing ones
          const existingIds=new Set((appState.day.sales||[]).map(s=>s.id));
          (fresh.sales||[]).forEach(s=>{if(s&&s.id&&!existingIds.has(s.id))appState.day.sales.push(JSON.parse(JSON.stringify(s)));});
        }
        // Always merge expenses and purchases
        const existingExpIds=new Set((appState.day.expenses||[]).map(e=>e.id));
        (fresh.expenses||[]).forEach(e=>{if(e&&e.id&&!existingExpIds.has(e.id))appState.day.expenses.push(JSON.parse(JSON.stringify(e)));});
        const existingPurIds=new Set((appState.day.purchases||[]).map(p=>p.id));
        (fresh.purchases||[]).forEach(p=>{if(p&&p.id&&!existingPurIds.has(p.id))appState.day.purchases.push(JSON.parse(JSON.stringify(p)));});
        ['shift','incharge','notes','production','stock','preforms','shrinkStock','stickerStock'].forEach(k=>{
          if(fresh[k]!==undefined)appState.day[k]=fresh[k];
        });
        render();
      }
    }
  }catch(e){console.error("_fbFetchToday error:",e);}
};

// Auto close at 12:45 AM - DISABLED for now to prevent data loss

</script>

async function fbSet(col,id,data){try{const{doc,setDoc}=window._fs;await setDoc(doc(window._db,col,id),data);}catch(e){console.error('fbSet error:',e);}}
async function fbUpd(col,id,data){try{const{doc,updateDoc}=window._fs;await updateDoc(doc(window._db,col,id),data);}catch(e){console.error('fbUpd error:',e);}}
async function fbDel(col,id){try{const{doc,deleteDoc}=window._fs;await deleteDoc(doc(window._db,col,id));}catch(e){console.error('fbDel error:',e);}}

// ── SYNC ENGINE ──
window._saveQueue=Promise.resolve();

async function syncDay(){
  window._saveQueue=window._saveQueue.then(async()=>{
    try{
      // Save complete day — Firebase listener only ADDS new items, never removes
      await fbSet("currentDay","today",JSON.parse(JSON.stringify(appState.day)));
    }catch(e){console.error("syncDay error:",e);}
  });
  await window._saveQueue;
}

window.doLogin = function(){

  const err=document.getElementById("loginErr");
  if(!box){render();return;}
  const val=box.value.trim();

    if(err) err.textContent="⏳ Still connecting to server... please wait 5 seconds and try again";
    return;

  const owner=String(window._ownerPin||"").trim();
  const viewer=String(window._viewerPin||"").trim();

    appState.unlocked=true;
    appState.role="ophead";
    appState.permission="entry";
    appState.currentUser={name:"Shivaraju G D",role:"ophead"};
    const latest=window._latestDay;
    const currentHour=new Date().getHours();
    const isNewDay=latest&&latest.date&&latest.date!==today();
    const isPastCutoff=currentHour>=6;
    if(isNewDay&&isPastCutoff&&(latest.sales||[]).length>0){
      appState.day=Object.assign(newDay(),latest);
      appState.day.sales=JSON.parse(JSON.stringify(latest.sales||[]));
      appState.day.expenses=JSON.parse(JSON.stringify(latest.expenses||[]));
      appState.day.purchases=JSON.parse(JSON.stringify(latest.purchases||[]));
      appState.tab="day";render();
      setTimeout(async()=>{await autoClosePreviousDay(appState.day,latest.date);},500);
    } else if(latest&&(latest.sales||[]).length>0&&!isNewDay){
      appState.day=Object.assign(newDay(),latest);
      appState.day.sales=JSON.parse(JSON.stringify(latest.sales||[]));
      appState.day.expenses=JSON.parse(JSON.stringify(latest.expenses||[]));
      appState.day.purchases=JSON.parse(JSON.stringify(latest.purchases||[]));
      appState.tab="day";render();
    } else {
      appState.day=loadPrevStock(newDay());
      appState.tab="day";render();
    }
    window._fbFetchToday();
    return;
  }

  // First time — set owner PIN
  if(!owner){
    if(!confirm("Set '"+val+"' as your OWNER PIN?\n\nThis gives full access. Keep it SECRET!")) return;
    window._ownerPin=val;
    fbSet("appSettings","pins",{ownerPin:val,viewerPin:""});
    appState.unlocked=true; appState.role="owner"; appState.tab="day";
    render(); return;

  if(val===owner){

      appState.day.expenses=JSON.parse(JSON.stringify(latest.expenses||[]));

      appState.day.finishedStock=JSON.parse(JSON.stringify(latest.finishedStock||{}));
      appState.tab="day";render();
      // Auto-save previous day silently
      setTimeout(async()=>{
        await autoClosePreviousDay(appState.day, latest.date);
      },500);
    } else if(latest&&(latest.sales||[]).length>0&&!isNewDay){
      appState.day=Object.assign(newDay(),latest);
      appState.day.sales=JSON.parse(JSON.stringify(latest.sales||[]));
      appState.day.expenses=JSON.parse(JSON.stringify(latest.expenses||[]));
      appState.day.purchases=JSON.parse(JSON.stringify(latest.purchases||[]));

        <div style="font-size:10px;color:#00e5cc;">${appState.currentUser?.name?`👤 ${appState.currentUser.name}`:""}</div>
        <div style="font-size:10px;color:#00e676;">🟢 Live</div>
      </div>
    </div>
    <div style="display:flex;gap:6px;flex-wrap:wrap;">
      ${[["#00e676","₹"+fmtN(ts),"Revenue"],["#ff4d4d","₹"+fmtN(te),"Expenses"],[ts-te>=0?"#00e5cc":"#ff4d4d","₹"+fmtN(ts-te),"Profit"],["#00e676","₹"+fmtN(cash),"Cash"],["#00bfff","₹"+fmtN(online),"Online"]].map(([c,v,l])=>`

// ── OPENING STOCK + PREFORMS ──
function buildStock(){
  const d=appState.day;
  if(!d.stickerStock){d.stickerStock={};STICKERS.forEach(s=>{d.stickerStock[s.id]={rolls:[],total:0};});}
  if(!d.shrinkStock){d.shrinkStock={};SHRINKS.forEach(s=>{d.shrinkStock[s.id]={rolls:[],total:0};});}

  // ── LIVE STOCK SUMMARY (auto from usage + purchases) ──
  function liveAvail(matId){
    const used=d.rmUsage.filter(r=>r.material===matId).reduce((s,r)=>s+num(r.qty),0);
    // Also add purchases of this material
    const purchased=d.purchases.filter(p=>p.material===matId).reduce((s,p)=>s+num(p.qty),0);
    if(matId.startsWith("pf_")&&matId.endsWith("_bags")){
      const size=matId.replace("pf_","").replace("_bags","");
      const pf=d.preforms?.[size]||{};
      const batches=pf.batches||[{bags:pf.bags||0,kgPerBag:pf.kgPerBag||25}];
      const opening=batches.reduce((s,b)=>s+num(b.bags),0);
      return Math.max(0,opening+purchased-used);
    }
    const shrink=SHRINKS.find(s=>s.id===matId);
    if(shrink){const sv=d.shrinkStock?.[matId]||{};const opening=(sv.rolls||[]).reduce((s,r)=>s+num(r),0);return Math.max(0,opening+purchased-used);}
    const cap=MATS.find(m=>m.id===matId);
    if(cap) return Math.max(0,num(d.stock[matId])+purchased-used);
    const stk=STICKERS.find(m=>m.id===matId);
    if(stk){const sv=d.stickerStock?.[matId]||{};const opening=(sv.rolls||[]).reduce((s,r)=>s+num(r),0)||num(sv.total);return Math.max(0,opening+purchased-used);}
    return 0;
  }

  return `
  <div class="card">
    <div class="lbl">📦 Opening Stock</div>

        const totalKg=pf.batches.reduce((s,b)=>s+num(b.bags)*num(b.kgPerBag||25),0);
        const totalPcs=totalKg>0?Math.floor(totalKg*1000/PFG[size]):0;
        const usedBags=d.rmUsage.filter(r=>r.material==='pf_'+size+'_bags').reduce((s,r)=>s+num(r.qty),0);
        const usedKg=d.rmUsage.filter(r=>r.material==='pf_'+size+'_bags').reduce((s,r)=>s+num(r.qty)*num(r.kgPerBag||25),0);
        const usedPcs=usedKg>0?Math.floor(usedKg*1000/PFG[size]):0;
        const availKg=Math.max(0,totalKg-usedKg);
        const availPcs=Math.max(0,totalPcs-usedPcs);
        return `<div style="background:#071520;border-radius:8px;padding:10px;margin-bottom:8px;">
          <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:8px;">
            <span style="font-weight:700;color:#00bfff;">${size} — ${PFG[size]}g each</span>
            <button onclick="addPFBatch('${size}')" style="background:#00bfff22;color:#00bfff;border:none;border-radius:6px;padding:3px 10px;font-size:11px;font-weight:700;cursor:pointer;">+ Add Bags</button>
          </div>
          ${pf.batches.map((b,i)=>`
          <div style="display:grid;grid-template-columns:1fr 1fr ${pf.batches.length>1?'auto':''};gap:8px;margin-bottom:6px;align-items:end;">
            <div><label class="flbl">Bags${pf.batches.length>1?' #'+(i+1):''}</label>
              <input class="inp" type="number" placeholder="0" value="${b.bags||''}" onchange="upPFBatch('${size}',${i},'bags',this.value)"/></div>
            <div><label class="flbl">Kg/Bag</label>
              <select class="sel" onchange="upPFBatch('${size}',${i},'kgPerBag',this.value)">
                <option ${num(b.kgPerBag||25)===25?"selected":""} value="25">25 kg</option>
                <option ${num(b.kgPerBag)===20?"selected":""} value="20">20 kg</option>
              </select></div>
            ${pf.batches.length>1?`<button onclick="delPFBatch('${size}',${i})" style="background:#ff4d4d22;color:#ff4d4d;border:none;border-radius:6px;padding:6px 8px;cursor:pointer;font-size:12px;margin-bottom:1px;">✕</button>`:''}
          </div>`).join('')}
          <div style="background:#1a3a55;border-radius:8px;padding:10px;margin-top:6px;">
            <div style="display:flex;justify-content:space-between;align-items:center;">
              <div>
                <div style="font-size:16px;font-weight:900;color:#00e676;">${totalKg.toFixed(1)} kg</div>
                <div style="font-size:11px;color:#aaa;">≈ ${fmtN(totalPcs)} pcs opening</div>
              </div>
              <div style="text-align:right;">
                <div style="font-size:14px;font-weight:800;color:${availPcs<100?'#ff4d4d':'#00bfff'};">${availKg.toFixed(1)} kg left</div>
                <div style="font-size:11px;color:#aaa;">≈ ${fmtN(availPcs)} pcs available</div>
                ${usedBags>0?`<div style="font-size:10px;color:#ff4d4d;">Used: ${usedBags} bags</div>`:''}
              </div>
            </div>
          </div>
        </div>`;
      }).join('')}
    </div>

    <!-- CAPS -->

      <div style="font-size:12px;font-weight:700;color:#ffc107;margin-bottom:8px;">🔵 CAPS</div>
      <div class="r2">
        <div>

          <input class="inp" type="number" placeholder="0" value="${d.stock['caps_white']||''}" onchange="appState.day.stock['caps_white']=this.value;syncDay()"/>
        </div>
        <div>
          <label class="flbl">Caps Blue (boxes) — Avail: ${liveAvail("caps_blue")} boxes</label>
          <input class="inp" type="number" placeholder="0" value="${d.stock['caps_blue']||''}" onchange="appState.day.stock['caps_blue']=this.value;syncDay()"/>
        </div>
      </div>
    </div>

    <!-- SHRINK ROLLS -->
    <div style="margin-bottom:14px;">
      <div style="font-size:12px;font-weight:700;color:#ffc107;margin-bottom:8px;">🌀 SHRINK ROLLS (add each roll)</div>
      ${SHRINKS.map(shrink=>{
        const sv=d.shrinkStock?.[shrink.id]||{rolls:[],total:0};
        const rolls=sv.rolls||[];
        const total=rolls.reduce((s,r)=>s+num(r),0);
        const avail=liveAvail(shrink.id);
        return `<div style="background:#071520;border-radius:8px;padding:10px;margin-bottom:8px;">
          <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:8px;">
            <span style="font-weight:700;color:#00bfff;">${shrink.label}</span>
            <div style="display:flex;align-items:center;gap:8px;">
              <span style="color:${avail<=0?'#ff4d4d':'#00e5cc'};font-weight:800;font-size:12px;">${avail.toFixed(1)} kg left</span>
              <button onclick="addShrinkRoll('${shrink.id}')" style="background:#00bfff22;color:#00bfff;border:none;border-radius:6px;padding:3px 10px;font-size:11px;font-weight:700;cursor:pointer;">+ Add Roll</button>
            </div>
          </div>
          ${rolls.length===0?`<div style="color:#5a8aaa;font-size:12px;">No rolls added yet</div>`:
            rolls.map((r,i)=>`<div style="display:flex;gap:8px;align-items:center;margin-bottom:6px;">

        </div>`;

    <!-- STICKERS -->
    <div style="margin-bottom:14px;">
      <div style="font-size:12px;font-weight:700;color:#ffc107;margin-bottom:8px;">🏷 STICKERS (add each roll)</div>
      ${STICKERS.map(stk=>{
        const sv=d.stickerStock?.[stk.id]||{rolls:[],total:0};
        const rolls=sv.rolls||[];
        const total=rolls.reduce((s,r)=>s+num(r),0);
        const avail=liveAvail(stk.id);
        return `<div style="background:#071520;border-radius:8px;padding:10px;margin-bottom:8px;">
          <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:8px;">
            <span style="font-weight:700;color:#00bfff;">${stk.label}</span>
            <div style="display:flex;align-items:center;gap:8px;">
              <span style="color:${avail<=0?'#ff4d4d':'#00e5cc'};font-weight:800;font-size:12px;">${fmtN(avail)} left</span>
              <button onclick="addStickerRoll('${stk.id}')" style="background:#00bfff22;color:#00bfff;border:none;border-radius:6px;padding:3px 10px;font-size:11px;font-weight:700;cursor:pointer;">+ Add Roll</button>
            </div>
          </div>
          ${rolls.length===0?`<div style="color:#5a8aaa;font-size:12px;">No rolls added yet</div>`:
            rolls.map((r,i)=>`<div style="display:flex;gap:8px;align-items:center;margin-bottom:6px;">
              <span style="color:#5a8aaa;font-size:12px;min-width:55px;">Roll ${i+1}:</span>

                onchange="upStickerRoll('${stk.id}',${i},this.value)" style="flex:1;"/>

            </div>`).join('')}

    <!-- MINERALS & CHEMICALS -->
    <div style="margin-bottom:8px;">
      <div style="font-size:12px;font-weight:700;color:#ffc107;margin-bottom:8px;">🧪 MINERALS & CHEMICALS</div>

// ── LIVE STOCK SUMMARY (used in Usage Log tab) ──
function buildStockSummary(){
  const d=appState.day;
  const rows=[];

  // Preforms
  SIZES.forEach(size=>{
    const pf=d.preforms?.[size]||{bags:'',kgPerBag:'25'};
    const kg=num(pf.bags)*num(pf.kgPerBag||25);
    const opening=kg>0?Math.floor(kg*1000/PFG[size]):0;
    if(opening===0) return;
    const usedBags=d.rmUsage.filter(r=>r.material==='pf_'+size+'_bags').reduce((s,r)=>s+num(r.qty),0);
    const usedNos=d.rmUsage.filter(r=>r.material==='pf_'+size).reduce((s,r)=>s+num(r.qty),0);
    const usedFromBags=usedBags>0?Math.floor(usedBags*num(pf.kgPerBag||25)*1000/PFG[size]):0;
    const totalUsed=usedNos+usedFromBags;

window.previewUsage=function(){

  const prev=document.getElementById("rmPreview");
  if(!prev) return;

      const cnt=Math.floor(kg*1000/PFG[size]);
      prev.innerHTML=`<div style="background:#00bfff15;border:1px solid #00bfff33;border-radius:8px;padding:8px;font-size:12px;color:#00bfff;">

window.addRM=function(){
  const matId=document.getElementById("rmMat")?.value;
  const qty=document.getElementById("rmQty")?.value;
  const note=document.getElementById("rmNote")?.value||"";
  if(!matId||!qty){alert("Select material and enter qty");return;}
  const d=appState.day;
  let label,unit,extra="";
  const SHRINK_LIST=[{id:"shrink_500",label:"Shrink Roll 500mm"},{id:"shrink_540",label:"Shrink Roll 540mm"},{id:"shrink_550",label:"Shrink Roll 550mm"}];

  // ── STOCK AVAILABILITY CHECK ──
  function getAvailable(mat){
    const alreadyUsed=d.rmUsage.filter(r=>r.material===mat).reduce((s,r)=>s+num(r.qty),0);
    if(mat.endsWith("_bags")){
      const size=mat.replace("pf_","").replace("_bags","");
      const pf=d.preforms?.[size]||{};
      const batches=pf.batches||[{bags:pf.bags||0,kgPerBag:pf.kgPerBag||25}];
      const openingBags=batches.reduce((s,b)=>s+num(b.bags),0);
      return openingBags-alreadyUsed;
    }
    const shrink=SHRINK_LIST.find(s=>s.id===mat);
    if(shrink){
      const sv=d.shrinkStock?.[mat]||{};
      const opening=(sv.rolls||[]).reduce((s,r)=>s+num(r),0)||num(sv.total)||0;
      return opening-alreadyUsed;
    }
    const capChem=MATS.find(m=>m.id===mat);
    if(capChem) return num(d.stock[mat])-alreadyUsed;
    const stk=STICKERS.find(m=>m.id===mat);
    if(stk){ const sv=d.stickerStock?.[mat]||{}; const opening=num(sv.total)||((sv.rolls||[]).reduce((s,r)=>s+num(r),0)); return opening-alreadyUsed; }
    return Infinity;
  }

  if(matId.endsWith("_bags")){
    const size=matId.replace("pf_","").replace("_bags","");
    const kgPerBag=num(document.getElementById("rmKgBag")?.value||25);
    const kg=num(qty)*kgPerBag;
    const cnt=Math.floor(kg*1000/PFG[size]);
    // Check bags available
    const avail=getAvailable(matId);
    if(num(qty)>avail){
      alert(`⚠️ Not enough bags!\nAvailable: ${avail} bags\nEntered: ${qty} bags`);return;
    }
    label=size+" Preforms"; unit="bags";
    extra="≈"+fmtN(cnt)+" preforms ("+qty+" bags × "+kgPerBag+"kg = "+kg.toFixed(1)+"kg)";
    appState.day.rmUsage.push({id:uid(),material:matId,label,unit,qty,note,extra,kgPerBag});
    render(); syncDay(); return;
  } else if(SHRINK_LIST.find(s=>s.id===matId)){
    const sh=SHRINK_LIST.find(s=>s.id===matId);
    const avail=getAvailable(matId);
    if(avail<=0||num(qty)>avail){
      alert(`⚠️ Not enough ${sh.label}!\nAvailable: ${avail.toFixed(1)} kg\nEntered: ${qty} kg`);return;
    }
    label=sh.label; unit="kg";
  } else {
    const mat=MATS.find(m=>m.id===matId)||STICKERS.find(m=>m.id===matId);
    if(!mat){alert("Select a valid material");return;}
    const avail=getAvailable(matId);
    const unit2=STICKERS.find(m=>m.id===matId)?"nos":mat.unit||"";
    if(num(d.stock[matId]||0)>0&&num(qty)>avail){
      alert(`⚠️ Not enough ${mat.label}!\nAvailable: ${avail} ${unit2}\nEntered: ${qty} ${unit2}`);return;
    }
    label=mat.label;
    unit=unit2;
  }
  appState.day.rmUsage.push({id:uid(),material:matId,label,unit,qty,note,extra});
  render(); syncDay();
};

window.delRM=function(id){if(appState.role!=="owner"){alert("Only owner can delete");return;}appState.day.rmUsage=appState.day.rmUsage.filter(r=>r.id!==id);render();syncDay();};

window.calcPur=function(){
  const matId=document.getElementById("purMat")?.value;
  const q=num(document.getElementById("purQty")?.value);
  const r=num(document.getElementById("purRate")?.value);
  const isPF=matId&&matId.startsWith("pf_");
  const isCaps=matId==="caps_white"||matId==="caps_blue";
  const kgBag=num(document.getElementById("purPfBagKg")?.value||25);
  const CAPS_PER_BOX=8000;
  // base calculation
  let base=0;
  if(isPF) base=q*kgBag*r;
  else if(isCaps) base=q*CAPS_PER_BOX*r; // boxes × 8000 caps × rate per cap
  else base=q*r;
  const el=document.getElementById("purTotal");
  if(el) el.value=base>0?base.toFixed(2):"";
  const calc=document.getElementById("purCalc");
  if(calc&&base>0){
    calc.innerHTML=`<div style="background:#1a3a55;border-radius:8px;padding:10px;margin-bottom:10px;font-size:13px;">
      ${isCaps?`<div style="display:flex;justify-content:space-between;padding:2px 0;"><span style="color:#5a8aaa;">${q} boxes × 8,000 caps/box</span><span style="color:#00bfff;font-weight:700;">= ${fmtN(q*CAPS_PER_BOX)} caps</span></div>
      <div style="display:flex;justify-content:space-between;padding:2px 0;"><span style="color:#5a8aaa;">Rate per cap</span><span>₹${r}</span></div>`:""}
      ${isPF?`<div style="display:flex;justify-content:space-between;padding:2px 0;"><span style="color:#5a8aaa;">${q} bags × ${kgBag}kg</span><span>= ${(q*kgBag).toFixed(1)} kg</span></div>`:""}
      <div style="display:flex;justify-content:space-between;padding:2px 0;border-top:1px solid #2a4a65;margin-top:4px;padding-top:4px;"><span style="color:#5a8aaa;">Base Total</span><span>₹${fmt(base)}</span></div>
      <div style="display:flex;justify-content:space-between;padding:2px 0;"><span style="color:#5a8aaa;">GST 18%</span><span style="color:#ffc107;">+₹${fmt(base*0.18)}</span></div>
      <div style="display:flex;justify-content:space-between;font-weight:800;border-top:1px solid #2a4a65;padding-top:6px;margin-top:6px;"><span>Grand Total</span><span style="color:#ff4d4d;">₹${fmt(base*1.18)}</span></div>
    </div>`;
  } else if(calc) calc.innerHTML="";
  // Preform preview
  const preview=document.getElementById("purPfPreview");
  if(preview&&isPF&&q>0&&r>0){
    const gram=num(document.getElementById("purPfGram")?.value||12.5);
    const totalKg=q*kgBag;
    const pcs=Math.floor(totalKg*1000/gram);
    preview.innerHTML=`<div style="background:#00e5cc15;border:1px solid #00e5cc33;border-radius:8px;padding:8px;font-size:12px;color:#00e5cc;margin-bottom:8px;">
      📦 ${q} bags × ${kgBag}kg = <strong>${totalKg.toFixed(1)} kg</strong> ≈ <strong>${fmtN(pcs)} preforms</strong> (${gram}g each)<br/>
      💰 ${totalKg.toFixed(1)}kg × ₹${r}/kg = <strong>₹${fmt(base)}</strong>
    </div>`;
  } else if(preview) preview.innerHTML="";
};

window.addPur=function(){
  const vend=document.getElementById("purVend")?.value?.trim();
  const matId=document.getElementById("purMat")?.value;
  const qty=num(document.getElementById("purQty")?.value);
  const rate=num(document.getElementById("purRate")?.value);
  const paid=document.getElementById("purPaid")?.value||"Paid";
  const note=document.getElementById("purNote")?.value||"";
  if(!vend||!qty||!rate){alert("Enter vendor, quantity and rate");return;}
  // Caps validation — catch if user entered individual caps instead of boxes
  const isCapsCheck=matId==="caps_white"||matId==="caps_blue";
  if(isCapsCheck&&qty>500){
    if(!confirm(`⚠️ You entered ${qty} — did you mean ${qty} BOXES (= ${fmtN(qty*8000)} caps)?\n\nTap OK to confirm ${qty} boxes, or Cancel to re-enter.`)) return;
  }
  const isPF=matId&&matId.startsWith("pf_");
  const isCaps=matId==="caps_white"||matId==="caps_blue";
  const kgBag=num(document.getElementById("purPfBagKg")?.value||25);
  const gram=num(document.getElementById("purPfGram")?.value||12.5);
  const CAPS_PER_BOX=8000;
  // Base calculation
  let base=0;
  if(isPF) base=qty*kgBag*rate;
  else if(isCaps) base=qty*CAPS_PER_BOX*rate;
  else base=qty*rate;
  const gstAmt=base*0.18;
  let label=matId,unit="",pfPreview="",stockUpdate=null;
  if(isPF){
    const size=matId.replace("pf_","").replace("_bags","");
    const totalKg=qty*kgBag;
    const pcs=Math.floor(totalKg*1000/gram);
    label=`Preforms ${size}`;unit="bags";
    pfPreview=`${qty} bags × ${kgBag}kg @ ₹${rate}/kg = ${totalKg.toFixed(1)}kg ≈ ${fmtN(pcs)} pcs`;
    const d=appState.day;
    if(!d.preforms) d.preforms={};
    if(!d.preforms[size]) d.preforms[size]={batches:[]};
    if(!d.preforms[size].batches) d.preforms[size].batches=[{bags:d.preforms[size].bags||0,kgPerBag:kgBag}];
    d.preforms[size].batches.push({bags:qty,kgPerBag:kgBag});
    stockUpdate=`✅ Preform ${size} stock updated: +${qty} bags (${totalKg.toFixed(1)}kg ≈ ${fmtN(pcs)} pcs)`;
  } else if(isCaps){
    const mat=MATS.find(m=>m.id===matId);
    label=mat?.label||matId;unit="boxes";
    pfPreview=`${qty} boxes × 8,000 caps @ ₹${rate}/cap = ${fmtN(qty*CAPS_PER_BOX)} caps`;
    appState.day.stock[matId]=(num(appState.day.stock[matId])||0)+qty;
    stockUpdate=`✅ ${label} stock updated: +${qty} boxes`;
  } else {
    const mat=MATS.find(m=>m.id===matId)||SHRINKS.find(m=>m.id===matId)||STICKERS.find(m=>m.id===matId);
    label=mat?.label||matId;
    unit=mat?.unit||"";
    if(matId&&MATS.find(m=>m.id===matId)){
      appState.day.stock[matId]=(num(appState.day.stock[matId])||0)+qty;
      stockUpdate=`✅ ${label} stock updated: +${qty}`;
    }
  }
  const entry={id:uid(),vendor:vend,material:matId,label,qty,unit,rate,rateUnit:isPF?"per kg":"per unit",kgBag:isPF?kgBag:null,totalKg:isPF?qty*kgBag:null,total:base,gstAmt,totalWithGST:base+gstAmt,paid,note,pfPreview,date:appState.day.date};
  appState.day.purchases.push(entry);
  if(paid==="Unpaid"||paid==="Part Paid"){
    const v=(window._vendors||[]).find(v=>v.name===vend);
    if(v) fbUpd("vendors",v.id,{outstanding:num(v.outstanding)+base+gstAmt});
  }
  // Save directly - avoid race condition
  const snapshot=JSON.parse(JSON.stringify(appState.day));
  fbSet("currentDay","today",snapshot);
  render();
  if(stockUpdate) setTimeout(()=>alert(stockUpdate),300);
};
window.delPur=function(id){
  if(appState.role!=="owner"){alert("Only owner can delete");return;}
  appState.day.purchases=appState.day.purchases.filter(p=>p.id!==id);
  syncDay();render();
};

// Auto-add to finished stock when production is entered
window.updateProduction=function(size,val){
  const d=appState.day;
  if(!d.finishedStock) d.finishedStock=Object.fromEntries(SIZES.map(s=>[s,0]));
  const old=num(d.production[size]);
  const newVal=num(val);
  const diff=newVal-old;
  d.production[size]=val;
  // Adjust finished stock by the difference
  d.finishedStock[size]=Math.max(0,num(d.finishedStock[size])+diff);
  syncDay();render();
};

            oninput="updateSaleLine(${i},'cases',this.value)"/>

  const draft=window._saleDraft;

  const stockEl=document.getElementById("saleStock_"+i);
  if(stockEl&&field==="size"){

    stockEl.textContent="Stock: "+fmtN(avail)+" cases avail";

window.calcCreditSplit=function(type){
  const draft=window._saleDraft||{items:[]};
  const draftTotal=draft.items.reduce((s,it)=>s+(num(it.cases)*num(it.price)),0);
  const paid=type==="Cash"?num(document.getElementById("saleCash")?.value):num(document.getElementById("saleOnline")?.value);
  const credit=Math.max(0,draftTotal-paid);
  const msg=document.getElementById("splitMsg");
  if(msg&&draftTotal>0){
    msg.innerHTML=`💵 Paid: ₹${fmt(paid)} &nbsp;|&nbsp; 📋 Credit: ₹${fmt(credit)}`;
    msg.style.color=credit>0?"#ffc107":"#00e676";
  }
};

window.calcSplit=function(){
  const cash=num(document.getElementById("saleCash")?.value);
  const online=num(document.getElementById("saleOnline")?.value);
  const total=num(document.getElementById("saleCases")?.value)*num(document.getElementById("salePrice")?.value);
  const diff=total-cash-online;
  const el=document.querySelector("#saleSplit div");
  if(el&&total) el.style.background=Math.abs(diff)<0.01?"#00e67615":"#ff4d4d15";
};

window.calcSale=function(){

  const size=document.getElementById("saleSize")?.value||"500ml";
  const pay=document.getElementById("salePay")?.value||"Cash";
  const total=cases*price;

  if(calc&&total){
    calc.innerHTML=`<div style="background:#1a3a55;border-radius:8px;padding:10px;margin:8px 0;font-size:13px;">
      <div style="display:flex;justify-content:space-between;"><span style="color:#5a8aaa;">Total (incl. GST 5%)</span><span style="font-weight:800;color:#00e676;">₹${fmt(total)}</span></div>
      <div style="display:flex;justify-content:space-between;"><span style="color:#5a8aaa;">Bottles</span><span>${fmtN(cases*BPC[size])}</span></div>
    </div>`;
  }

  if(split){
    split.innerHTML=pay==="Both"?`<div class="r2" style="margin-top:8px;">

      <div><label class="flbl">Online Amount</label><input class="inp" type="number" id="saleOnline" placeholder="0"/></div>
    </div>`:"";

window.addSale=function(){
  const cust=document.getElementById("saleCust")?.value?.trim();
  const pay=document.getElementById("salePay")?.value||"Cash";
  const note=document.getElementById("saleNote")?.value||"";
  const draft=window._saleDraft||{items:[{size:"200ml",cases:"",price:""}]};
  if(!cust){alert("Select a customer");return;}

  // Validate all items have cases and price
  for(let i=0;i<draft.items.length;i++){
    const it=draft.items[i];
    if(!it.cases||!it.price){alert("Fill cases and price for Item "+(i+1));return;}
    if(num(it.cases)<=0||num(it.price)<=0){alert("Cases and price must be greater than 0 for Item "+(i+1));return;}
  }

  if(!window._salePhoto){
    const photoEl=document.getElementById("salePhotoPreview");
    if(photoEl) photoEl.innerHTML=`<div style="background:#ff4d4d22;border:1px solid #ff4d4d55;border-radius:8px;padding:10px;color:#ff4d4d;font-size:13px;font-weight:700;margin-bottom:6px;">📷 Photo is required!</div>`;
    return;
  }

  // Build items array from draft
  const items=draft.items.map(it=>({
    size:it.size,
    cases:num(it.cases),
    pricePerCase:num(it.price),
    total:num(it.cases)*num(it.price),
    bottles:num(it.cases)*(BPC[it.size]||24)
  }));
  const total=items.reduce((s,it)=>s+it.total,0);

  let cashAmt=0,onlineAmt=0,creditAmt=0;
  if(pay==="Cash") cashAmt=total;
  else if(pay==="Online") onlineAmt=total;
  else if(pay==="Credit") creditAmt=total;
  else if(pay==="Both"){
    cashAmt=num(document.getElementById("saleCash")?.value);
    onlineAmt=num(document.getElementById("saleOnline")?.value);
  }
  else if(pay==="CashCredit"){
    cashAmt=num(document.getElementById("saleCash")?.value);
    creditAmt=Math.max(0,total-cashAmt);
  }
  else if(pay==="OnlineCredit"){
    onlineAmt=num(document.getElementById("saleOnline")?.value);
    creditAmt=Math.max(0,total-onlineAmt);
  }
  // Validate split payments
  if(pay==="Both"&&Math.abs(cashAmt+onlineAmt-total)>1){
    alert("Cash + Online must equal total ₹"+fmt(total)+"\nCurrently: ₹"+fmt(cashAmt+onlineAmt));return;
  }
  if((pay==="CashCredit"||pay==="OnlineCredit")&&(cashAmt+onlineAmt)<=0){
    alert("Enter amount paid now");return;
  }

  const invNo="INV-"+appState.day.date.replace(/-/g,"")+"-"+uid().slice(-4).toUpperCase();
  const entry={
    id:uid(),
    customer:cust,
    items,
    size:items[0].size,
    cases:items[0].cases,
    pricePerCase:items[0].pricePerCase,
    payMode:pay,cashAmt,onlineAmt,creditAmt,note,
    photo:window._salePhoto||null,
    invNo,total,
    bottles:items.reduce((s,it)=>s+it.bottles,0),
    date:appState.day.date,
    savedAt:new Date().toISOString(),
    savedBy:appState.currentUser?.name||appState.day.incharge||""
  };

  appState.day.sales.push(entry);
  const d=appState.day;
  if(!d.finishedStock) d.finishedStock=Object.fromEntries(SIZES.map(s=>[s,0]));
  items.forEach(it=>{
    if(num(d.finishedStock[it.size])>0)
      d.finishedStock[it.size]=Math.max(0,num(d.finishedStock[it.size])-it.cases);
  });

  // Update customer outstanding — only credit portion
  const outstandingAmt = creditAmt>0 ? creditAmt : (pay==="Credit"?total:0);
  if(outstandingAmt>0){
    const c=(window._customers||[]).find(c=>c.name===cust);
    if(c) fbUpd("customers",c.id,{balance:num(c.balance)+outstandingAmt});
  }

  // Reset form
  window._salePhoto=null;
  window._saleDraft={items:[{size:"200ml",cases:"",price:""}]};

  // Save to Firebase immediately
  const snapshot=JSON.parse(JSON.stringify(appState.day));
  fbSet("currentDay","today",snapshot);

  // Render after save
  render();
  alert("✅ Sale saved! Customer: "+cust+"\nTotal: ₹"+fmt(total)+"\nItems: "+items.map(it=>it.cases+"cs "+it.size).join(", "));
};
window.delSale=function(id){
  if(appState.role!=="owner"){alert("Only owner can delete");return;}
  const sale=appState.day.sales.find(s=>s.id===id);
  if(sale){
    if(!appState.day.finishedStock) appState.day.finishedStock=Object.fromEntries(SIZES.map(s=>[s,0]));
    (sale.items||[{size:sale.size,cases:sale.cases}]).forEach(it=>{
      appState.day.finishedStock[it.size]=(num(appState.day.finishedStock[it.size])||0)+num(it.cases);
    });
  }
  appState.day.sales=appState.day.sales.filter(s=>s.id!==id);
  syncDay();render();
};

function buildRpts(){

window.setRptRange=function(label){
  const now=new Date(),f=d=>d.toISOString().split("T")[0];
  if(label==="Today"){appState.rptFrom=appState.rptTo=f(now);}
  else if(label==="Last 7 days"){const d=new Date(now);d.setDate(d.getDate()-6);appState.rptFrom=f(d);appState.rptTo=f(now);}
  else if(label==="Last 30 days"){const d=new Date(now);d.setDate(d.getDate()-29);appState.rptFrom=f(d);appState.rptTo=f(now);}
  else if(label==="This Month"){appState.rptFrom=f(now).slice(0,7)+"-01";appState.rptTo=f(now);}
  else if(label==="All time"){appState.rptFrom="";appState.rptTo="";}
  render();
};

function buildInv(){

  const allSales=[];
  allReports.forEach(r=>(r.sales||[]).forEach(s=>allSales.push({...s,date:r.date||s.date,shift:r.shift||""})));
  (appState.day.sales||[]).forEach(s=>{if(!allSales.find(x=>x.id===s.id))allSales.push({...s,date:appState.day.date});});
  allSales.sort((a,b)=>b.date.localeCompare(a.date)||b.id.localeCompare(a.id));
  const uniqueDates=[...new Set(allSales.map(s=>s.date))].sort((a,b)=>b.localeCompare(a));
  const selDate=appState.invDate||(uniqueDates[0]||today());

            <span style="font-weight:900;color:#00e676;font-size:14px;">₹${fmt(s.total)}</span>

// Mobile-safe print: write content into a hidden iframe and call print on it
function mobilePrint(contentHTML){
  // Remove any existing print iframe
  const old=document.getElementById("_pif");
  if(old) old.remove();
  const iframe=document.createElement("iframe");
  iframe.id="_pif";
  iframe.style.cssText="position:fixed;left:-9999px;top:-9999px;width:1px;height:1px;border:none;";
  document.body.appendChild(iframe);
  const doc=iframe.contentWindow.document;
  doc.open();
  doc.write(`<!DOCTYPE html><html><head><meta charset="utf-8"/>
    <meta name="viewport" content="width=device-width,initial-scale=1"/>
    <title>Paramm Invoice</title>
    <style>
      *{margin:0;padding:0;box-sizing:border-box;}
      body{font-family:Arial,sans-serif;padding:20px;font-size:12px;color:#111;}
      table{width:100%;border-collapse:collapse;}
      th{background:#003d5c;color:#fff;padding:8px;text-align:left;}
      th:not(:first-child){text-align:right;}
      td{padding:8px;border-bottom:1px solid #eee;}
      td:not(:first-child){text-align:right;}
    </style>
  </head><body>${contentHTML}</body></html>`);
  doc.close();
  iframe.contentWindow.focus();
  setTimeout(function(){
    try{ iframe.contentWindow.print(); }
    catch(e){ window.print(); }
  }, 600);
}

// Quick payment from outstanding page
window.quickPayCust=function(id,name,balance){
  const amt=prompt("Payment received from "+name+"\nOutstanding: ₹"+fmt(balance)+"\n\nEnter amount received:");
  if(!amt||num(amt)<=0) return;
  const method=prompt("Payment method? (Cash/UPI/Bank Transfer):","Cash")||"Cash";
  const c=(window._customers||[]).find(c=>c.id===id);
  if(!c) return;
  const payment={id:uid(),amount:amt,method,date:today(),note:"Quick payment from Outstanding page"};
  fbUpd("customers",id,{balance:Math.max(0,num(c.balance)-num(amt)),payments:[...(c.payments||[]),payment]});
  alert("✅ Payment of ₹"+fmt(amt)+" recorded for "+name);
};

window.quickPayVend=function(id,name,outstanding){
  const amt=prompt("Payment to "+name+"\nOutstanding: ₹"+fmt(outstanding)+"\n\nEnter amount paid:");
  if(!amt||num(amt)<=0) return;
  const method=prompt("Payment method? (Cash/UPI/Bank Transfer):","Bank Transfer")||"Bank Transfer";
  const v=(window._vendors||[]).find(v=>v.id===id);
  if(!v) return;
  const payment={id:uid(),amount:amt,method,date:today(),note:"Quick payment from Outstanding page"};
  fbUpd("vendors",id,{outstanding:Math.max(0,num(v.outstanding)-num(amt)),payments:[...(v.payments||[]),payment]});
  alert("✅ Payment of ₹"+fmt(amt)+" recorded to "+name);
};

// ── EXPORT ──
function getAllReports(){
  const saved=window._reports||[];
  const today=appState.day;
  const todayHasData=(today.sales&&today.sales.length>0)||(today.expenses&&today.expenses.length>0)||(today.production&&SIZES.some(s=>num(today.production[s])>0));
  // Check if today's report is already in saved (by date match)
  const alreadySaved=saved.find(r=>r.date===today.date&&(r.sales||[]).length>=(today.sales||[]).length);
  if(!todayHasData&&alreadySaved) return saved;
  if(alreadySaved) return saved; // saved version has at least as many sales
  const ts=(today.sales||[]).reduce((s,x)=>s+num(x.total),0);
  const te=(today.expenses||[]).reduce((s,x)=>s+num(x.amount),0);
  const todayReport={...today,savedAt:today.savedAt||new Date().toISOString(),totalSales:ts,totalExp:te,netProfit:ts-te};
  // Remove any existing entry for today's date from saved to avoid duplicates
  const withoutToday=saved.filter(r=>r.date!==today.date);
  return [todayReport,...withoutToday];
}

// Load prevStock from Firebase into a new day if available
function loadPrevStock(day){
  const ps=window._prevStock;
  if(!ps||ps.date===day.date) return day; // same day or no prev stock
  if(ps.stock) day.stock=Object.assign({},ps.stock);
  if(ps.preforms) day.preforms=Object.assign({},ps.preforms);
  if(ps.shrinkStock) day.shrinkStock=Object.assign({},ps.shrinkStock);
  if(ps.stickerStock) day.stickerStock=Object.assign({},ps.stickerStock);
  if(ps.finishedStock) day.finishedStock=Object.assign({},ps.finishedStock);
  return day;
}

// ── CALC CLOSING STOCK ──
function calcClosingStock(d){
  const carryPF={};
  SIZES.forEach(size=>{
    const pf=d.preforms?.[size]||{batches:[{bags:0,kgPerBag:25}]};
    const batches=pf.batches||[{bags:pf.bags||0,kgPerBag:pf.kgPerBag||25}];
    const totalBags=batches.reduce((s,b)=>s+num(b.bags),0);
    const usedBags=(d.rmUsage||[]).filter(r=>r.material==='pf_'+size+'_bags').reduce((s,r)=>s+num(r.qty),0);
    const purchasedBags=(d.purchases||[]).filter(p=>p.material==='pf_'+size+'_bags').reduce((s,p)=>s+num(p.qty),0);
    const avgKgBag=batches.length>0?batches.reduce((s,b)=>s+num(b.kgPerBag||25),0)/batches.length:25;
    const remainBags=Math.max(0,totalBags+purchasedBags-usedBags);
    carryPF[size]={batches:[{bags:+remainBags.toFixed(2),kgPerBag:avgKgBag}]};
  });
  const carryShrink={};
  SHRINKS.forEach(sh=>{
    const sv=d.shrinkStock?.[sh.id]||{rolls:[]};
    const totalKg=(sv.rolls||[]).reduce((s,r)=>s+num(r),0);
    const usedKg=(d.rmUsage||[]).filter(r=>r.material===sh.id).reduce((s,r)=>s+num(r.qty),0);
    const purchasedKg=(d.purchases||[]).filter(p=>p.material===sh.id).reduce((s,p)=>s+num(p.qty),0);
    carryShrink[sh.id]={rolls:[+Math.max(0,totalKg+purchasedKg-usedKg).toFixed(2)]};
  });
  const carryStk={};
  STICKERS.forEach(stk=>{
    const sv=d.stickerStock?.[stk.id]||{rolls:[]};
    const total=(sv.rolls||[]).reduce((s,r)=>s+num(r),0);
    const used=(d.rmUsage||[]).filter(r=>r.material===stk.id).reduce((s,r)=>s+num(r.qty),0);
    carryStk[stk.id]={rolls:[Math.max(0,total-used)]};
  });
  const carryStock={};
  MATS.forEach(m=>{
    const used=(d.rmUsage||[]).filter(r=>r.material===m.id).reduce((s,r)=>s+num(r.qty),0);
    const purchased=(d.purchases||[]).filter(p=>p.material===m.id).reduce((s,p)=>s+num(p.qty),0);
    carryStock[m.id]=Math.max(0,num(d.stock?.[m.id]||0)+purchased-used);
  });
  const carryFinished={};
  SIZES.forEach(sz=>{
    const opening=num(d.finishedStock?.[sz]||0);
    const produced=num(d.production?.[sz]||0);
    const sold=(d.sales||[]).reduce((s,sale)=>{
      return s+(sale.items||[{size:sale.size,cases:sale.cases}]).filter(it=>it.size===sz).reduce((t,it)=>t+num(it.cases),0);
    },0);
    carryFinished[sz]=Math.max(0,opening+produced-sold);
  });
  return {preforms:carryPF,shrinkStock:carryShrink,stickerStock:carryStk,stock:carryStock,finishedStock:carryFinished};
}

// ── APPLY PREV STOCK ──
function applyPrevStockIfNewDay(){
  if(!window._prevStock)return;
  if(window._prevStock.date===appState.day.date)return;
  if(!appState.unlocked)return;
  const hasStock=SIZES.some(s=>appState.day.preforms?.[s]?.batches?.reduce((t,b)=>t+(b.bags||0),0)>0);
  if(hasStock)return;
  appState.day=loadPrevStock(appState.day);
  render();
}

// ── SAVE DAY ──
window.saveDay=async function(){
  const d=appState.day;
  const isPastDate=d.date!==today();
  if(!d.sales.length&&!d.expenses.length&&!isPastDate){alert("No data to save today.");return;}
  const confirmMsg=isPastDate
    ?("Save report for "+d.date+"?\n\nSales: "+d.sales.length+" | Revenue: ₹"+fmt(d.sales.reduce((s,x)=>s+num(x.total),0))+"\nExpenses: "+d.expenses.length)
    :"Close today and save?\n\nStock will carry forward to tomorrow.";
  if(!confirm(confirmMsg))return;
  const ts=d.sales.reduce((s,x)=>s+num(x.total),0);
  const te=d.expenses.reduce((s,x)=>s+num(x.amount),0);
  const custOuts=(window._customers||[]).reduce((s,c)=>s+num(c.balance),0);
  const vendOuts=(window._vendors||[]).reduce((s,v)=>s+num(v.outstanding),0);
  const closing=calcClosingStock(d);
  const prevStock={...closing,date:d.date};
  await fbSet("reports",d.id,{...d,savedAt:new Date().toISOString(),totalSales:ts,totalExp:te,netProfit:ts-te,custOutstanding:custOuts,vendOutstanding:vendOuts,closingStock:closing});
  await fbSet("appSettings","prevStock",prevStock);
  if(isPastDate){
    alert("✅ Report saved for "+d.date+"!\nClosing stock saved — opens auto on next date entry.");
    const latest=window._latestDay;
    if(latest&&latest.date===today()){
      appState.day=Object.assign(newDay(),latest);
      appState.day.sales=JSON.parse(JSON.stringify(latest.sales||[]));
      appState.day.expenses=JSON.parse(JSON.stringify(latest.expenses||[]));
      appState.day.purchases=JSON.parse(JSON.stringify(latest.purchases||[]));
    }else{appState.day=loadPrevStock(newDay());}
    appState.tab="rpts";render();return;
  }
  const next=newDay();
  next.preforms=closing.preforms;
  next.shrinkStock=closing.shrinkStock;
  next.stickerStock=closing.stickerStock;
  next.stock=closing.stock;
  next.finishedStock=closing.finishedStock;
  appState.day=next;
  await fbSet("currentDay","today",JSON.parse(JSON.stringify(next)));
  appState.tab="rpts";render();
  alert("✅ Day saved!\nClosing stock carried to tomorrow:\n"+SIZES.map(s=>s+": "+closing.finishedStock[s]+" cases").join("\n"));
};

// ── PAST DATE ENTRY ──
window.onDayDateChange=async function(newDate){
  if(newDate===today()){
    const latest=window._latestDay;
    if(latest&&latest.date===today()){
      appState.day=Object.assign(newDay(),latest);
      appState.day.sales=JSON.parse(JSON.stringify(latest.sales||[]));
      appState.day.expenses=JSON.parse(JSON.stringify(latest.expenses||[]));
      appState.day.purchases=JSON.parse(JSON.stringify(latest.purchases||[]));
    }else{appState.day=loadPrevStock(newDay());}
    render();return;
  }
  const allReports=window._reports||[];
  const existing=allReports.find(r=>r.date===newDate);
  if(existing){
    if(!confirm("Report for "+newDate+" exists.\nSales: "+(existing.sales||[]).length+" | ₹"+fmt(existing.totalSales)+"\n\nLoad to edit?"))return;
    appState.day=JSON.parse(JSON.stringify(existing));
    appState.day.sales=JSON.parse(JSON.stringify(existing.sales||[]));
    appState.day.expenses=JSON.parse(JSON.stringify(existing.expenses||[]));
    appState.day.purchases=JSON.parse(JSON.stringify(existing.purchases||[]));
    render();
    alert("✅ Loaded "+newDate+". Edit and tap Save.");
    return;
  }
  const sortedReports=allReports.filter(r=>r.date<newDate).sort((a,b)=>b.date.localeCompare(a.date));
  const prevReport=sortedReports[0];
  const pastDay=newDay();
  pastDay.date=newDate;
  pastDay.id="past_"+newDate.replace(/-/g,"")+"_"+uid();
  if(prevReport){
    const prevClosing=prevReport.closingStock||calcClosingStock(prevReport);
    pastDay.preforms=JSON.parse(JSON.stringify(prevClosing.preforms||{}));
    pastDay.shrinkStock=JSON.parse(JSON.stringify(prevClosing.shrinkStock||{}));
    pastDay.stickerStock=JSON.parse(JSON.stringify(prevClosing.stickerStock||{}));
    pastDay.stock=JSON.parse(JSON.stringify(prevClosing.stock||{}));
    pastDay.finishedStock=JSON.parse(JSON.stringify(prevClosing.finishedStock||{}));
    appState.day=pastDay;render();
    alert("✅ Opened "+newDate+"\nOpening stock loaded from "+prevReport.date+":\n"+SIZES.map(s=>s+": "+(prevClosing.finishedStock?.[s]||0)+" cases").join("\n"));
  }else{
    appState.day=pastDay;render();
    alert("No previous report found.\nPlease enter opening stock manually in Stock tab.");
  }
};


// ── AUTO CLOSE PREVIOUS DAY ──
async function autoClosePreviousDay(dayData, prevDate){
  try{
    const ts=(dayData.sales||[]).reduce((s,x)=>s+num(x.total),0);
    const te=(dayData.expenses||[]).reduce((s,x)=>s+num(x.amount),0);
    const custOuts=(window._customers||[]).reduce((s,c)=>s+num(c.balance),0);
    const vendOuts=(window._vendors||[]).reduce((s,v)=>s+num(v.outstanding),0);
    const closing=calcClosingStock(dayData);
    const prevStock={...closing,date:prevDate};
    await fbSet("reports",dayData.id,{
      ...dayData,date:prevDate,
      savedAt:new Date().toISOString(),
      totalSales:ts,totalExp:te,netProfit:ts-te,
      custOutstanding:custOuts,vendOutstanding:vendOuts,
      closingStock:closing,autoSaved:true
    });
    await fbSet("appSettings","prevStock",prevStock);
    const next=newDay();
    next.preforms=closing.preforms;
    next.shrinkStock=closing.shrinkStock;
    next.stickerStock=closing.stickerStock;
    next.stock=closing.stock;
    next.finishedStock=closing.finishedStock;
    appState.day=next;
    await fbSet("currentDay","today",JSON.parse(JSON.stringify(next)));
    render();
    setTimeout(()=>{
      alert("📅 "+prevDate+" auto-saved!\n✅ "+(dayData.sales||[]).length+" sales | ₹"+fmt(ts)+"\n📦 Stock carried to today.\n\nToday ("+today()+") started fresh!");
    },300);
  }catch(e){console.error("autoClose error:",e);}
}

window.resetAllCodes=async function(){
  if(!confirm("Delete ALL staff codes? Staff will be locked out immediately!")) return;
  try{
    const snap=await window._getDocs("staffCodes");
    for(const d of snap.docs){ await window._deleteDoc("staffCodes",d.id); }
    window._staffCodes=[];
    alert("✅ All staff codes deleted!");
    render();
  }catch(e){ alert("Error: "+e.message); }
};

window.wipeTrialData=async function(){
  if(!confirm("DELETE ALL DATA?\n\nReports, Customers, Vendors, Staff codes, Today.\nOwner PIN kept. Cannot be undone!")) return;
  if(!confirm("FINAL CONFIRM — This cannot be undone!")) return;
  try{
    for(const col of ["reports","customers","vendors","staffCodes","currentDay"]){
      try{
        const snap=await window._getDocs(col);
        for(const d of snap.docs){ await window._deleteDoc(col,d.id); }
      }catch(e){}
    }
    try{await window._deleteDoc("appSettings","prevStock");}catch(e){}
    // Clear all in-memory state
    window._reports=[];
    window._customers=[];
    window._vendors=[];
    window._staffCodes=[];
    window._latestDay=null;
    window._prevStock=null;
    appState.day=newDay();
    appState.currentUser=null;
    alert("✅ All data wiped! Reloading...");
    // Force reload to clear all cached state
    setTimeout(()=>window.location.reload(),1000);
  }catch(e){ alert("Error: "+e.message); }
};

window.wipeTodayData=async function(){
  if(!confirm("Clear today's entries only?")) return;
  try{await window._deleteDoc("currentDay","today");}catch(e){}
  appState.day=newDay();window._dayEdited=false;
  alert("✅ Today cleared!");render();
};
